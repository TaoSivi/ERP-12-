<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaoBooks ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans Lao', 'Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50:'#eef6ff',100:'#d9ebff',200:'#bcdcff',300:'#8ec6ff',400:'#59a6ff',500:'#3385fb',600:'#1f66f0',700:'#1850dd',800:'#1a43b3',900:'#1b3c8d' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="bg-slate-100 text-slate-800">
  <!-- App shell -->
  <div id="app" class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 shrink-0 bg-slate-900 text-slate-300 flex flex-col fixed inset-y-0 left-0 z-30 -translate-x-full lg:translate-x-0 transition-transform">
      <div class="h-16 flex items-center gap-2 px-5 border-b border-white/10">
        <div class="w-9 h-9 rounded-lg bg-brand-500 grid place-items-center text-white font-bold text-lg">L</div>
        <div>
          <div class="text-white font-semibold leading-tight">LaoBooks</div>
          <div class="text-[11px] text-slate-400">ERP ສຳລັບ SME ລາວ</div>
        </div>
      </div>
      <nav id="nav" class="flex-1 overflow-y-auto py-3 text-sm"></nav>
      <div class="p-3 border-t border-white/10 text-[11px] text-slate-400">
        <div id="conn-badge" class="mb-1"></div>
        <div>v1.0 · 12 ໂມດູນ</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 lg:ml-64 flex flex-col min-w-0">
      <header class="h-16 bg-white border-b border-slate-200 flex items-center gap-3 px-4 sticky top-0 z-20">
        <button id="menuBtn" class="lg:hidden p-2 rounded hover:bg-slate-100">☰</button>
        <div class="flex-1 max-w-md relative">
          <input id="globalSearch" placeholder="ຄົ້ນຫາ Invoice, Bill, ລູກຄ້າ, ສິນຄ້າ..." class="w-full pl-9 pr-3 py-2 rounded-lg bg-slate-100 focus:bg-white border border-transparent focus:border-brand-300 outline-none text-sm" />
          <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
          <div id="searchResults" class="hidden absolute mt-1 w-full bg-white rounded-lg shadow-xl border border-slate-200 max-h-80 overflow-y-auto z-40"></div>
        </div>
        <div class="flex items-center gap-2">
          <span id="companyName" class="hidden sm:block text-sm font-medium text-slate-600"></span>
          <div class="w-9 h-9 rounded-full bg-brand-100 text-brand-700 grid place-items-center font-semibold">T</div>
        </div>
      </header>

      <main id="view" class="flex-1 p-4 sm:p-6 max-w-7xl w-full mx-auto"></main>
    </div>
  </div>

  <!-- Modal root -->
  <div id="modalRoot"></div>
  <!-- Toast root -->
  <div id="toastRoot" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/accounting.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
