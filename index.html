  <style>
/* LaoBooks ERP – custom styles on top of Tailwind */
* { -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans Lao','Inter',sans-serif; }

/* Sidebar nav items */
.nav-group { padding: 6px 14px 4px; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: #64748b; margin-top: 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 14px; margin:1px 8px; border-radius:8px; color:#cbd5e1; cursor:pointer; transition:.12s; }
.nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
.nav-item.active { background:#1f66f0; color:#fff; box-shadow:0 2px 8px rgba(31,102,240,.4); }
.nav-item .ico { width:18px; text-align:center; font-size:15px; }

/* Cards & tables */
.card { background:#fff; border:1px solid #e2e8f0; border-radius:14px; }
.kpi { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px 18px; }
.kpi .label { font-size:12px; color:#64748b; }
.kpi .value { font-size:22px; font-weight:700; margin-top:2px; }

table.data { width:100%; border-collapse:collapse; font-size:13.5px; }
table.data th { text-align:left; font-weight:600; color:#475569; padding:10px 12px; border-bottom:1px solid #e2e8f0; background:#f8fafc; position:sticky; top:0; }
table.data td { padding:10px 12px; border-bottom:1px solid #f1f5f9; }
table.data tr:hover td { background:#f8fafc; }
.num { text-align:right; font-variant-numeric: tabular-nums; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600; }
.badge.gray{background:#f1f5f9;color:#475569}
.badge.green{background:#dcfce7;color:#15803d}
.badge.amber{background:#fef3c7;color:#b45309}
.badge.red{background:#fee2e2;color:#b91c1c}
.badge.blue{background:#dbeafe;color:#1d4ed8}
.badge.violet{background:#ede9fe;color:#6d28d9}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.12s;white-space:nowrap}
.btn-primary{background:#1f66f0;color:#fff}
.btn-primary:hover{background:#1850dd}
.btn-ghost{background:#fff;color:#334155;border-color:#e2e8f0}
.btn-ghost:hover{background:#f8fafc}
.btn-danger{background:#fee2e2;color:#b91c1c}
.btn-sm{padding:5px 10px;font-size:12.5px}

.input,select.input,textarea.input{width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:9px;font-size:13.5px;outline:none;background:#fff}
.input:focus{border-color:#3385fb;box-shadow:0 0 0 3px rgba(51,133,251,.15)}
label.field{display:block;font-size:12.5px;font-weight:600;color:#475569;margin-bottom:4px}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:40;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:720px;margin-top:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}

.toast{background:#0f172a;color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .2s}
.toast.ok{background:#15803d}.toast.err{background:#b91c1c}.toast.warn{background:#b45309}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

.tab{padding:8px 4px;margin-right:18px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#1f66f0;border-color:#1f66f0}

.je-line{display:grid;grid-template-columns:1fr 120px 120px;gap:8px;align-items:center}
.hint{font-size:12px;color:#94a3b8}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9px}

</style>
</head>

  <script>

/* ===== config.js ===== */
/* ============================================================
   LaoBooks ERP – Configuration
   ------------------------------------------------------------
   ຖ້າຢາກເກັບຂໍ້ມູນໃນ Google Sheet:
   1) ເປີດ README.md → ເຮັດຕາມຂັ້ນຕອນ deploy Apps Script
   2) ເອົາ URL ຂອງ Web App ມາໃສ່ APPS_SCRIPT_URL ຂ້າງລຸ່ມ
   ຖ້າປະໄວ້ວ່າງ ("") → ໂປແກມຈະໃຊ້ Demo Mode (ເກັບໃນ browser)
   ============================================================ */
window.ERP_CONFIG = {
  // ⬇️ ວາງ URL Web App ຂອງ Google Apps Script ທີ່ນີ້
  APPS_SCRIPT_URL: "",

  COMPANY: {
    name: "ບໍລິສັດ ຕົວຢ່າງ ຈຳກັດ",
    tin: "1234567890",
    currency: "LAK",
    vat_rate: 10,
    fiscal_year_start: "01-01"
  },

  // ຕັ້ງຄ່າ demo ຂໍ້ມູນຕົວຢ່າງເມື່ອເປີດຄັ້ງທຳອິດ (Demo Mode)
  SEED_DEMO_DATA: true
};


/* ===== store.js ===== */
/* ============================================================
   LaoBooks ERP – Data Store
   Works in two modes:
   • Demo Mode  → data kept in browser localStorage
   • Cloud Mode → data read/written to Google Sheet via Apps Script
   Same API either way:  Store.all(c) / .get(c,id) / .insert / .update / .remove
   ============================================================ */
(function () {
  const COLLECTIONS = [
    "settings","accounts","taxcodes","customers","vendors","items",
    "invoices","invoice_lines","bills","bill_lines",
    "journal_entries","journal_lines","payments","bank_accounts","stock_moves",
    "quotes","quote_lines","purchase_orders","po_lines",
    "employees","payroll","assets","budgets","audit_log"
  ];

  const LS_KEY = "laobooks_db_v1";
  let DB = {};
  let backend = null;
  let counter = 0;

  function uid(prefix) {
    counter++;
    return (prefix || "id") + "_" + Date.now().toString(36) + counter.toString(36);
  }

  /* ---------- Local (Demo) backend ---------- */
  const LocalBackend = {
    kind: "demo",
    async loadAll() {
      const raw = localStorage.getItem(LS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      const out = {};
      COLLECTIONS.forEach(c => (out[c] = data[c] || []));
      return out;
    },
    persist() { localStorage.setItem(LS_KEY, JSON.stringify(DB)); },
    async append() { this.persist(); },
    async update() { this.persist(); },
    async remove() { this.persist(); }
  };

  /* ---------- Remote (Google Sheet) backend ---------- */
  const RemoteBackend = {
    kind: "cloud",
    url: "",
    async call(action, payload) {
      const res = await fetch(this.url, {
        method: "POST",
        // text/plain avoids CORS pre-flight with Apps Script
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, payload })
      });
      const txt = await res.text();
      let json;
      try { json = JSON.parse(txt); } catch (e) { throw new Error("ຕອບກັບບໍ່ຖືກຕ້ອງ: " + txt.slice(0, 120)); }
      if (!json.ok) throw new Error(json.error || "server error");
      return json.data;
    },
    async loadAll() {
      const data = await this.call("loadAll", {});
      const out = {};
      COLLECTIONS.forEach(c => (out[c] = data[c] || []));
      return out;
    },
    async append(coll, obj) { await this.call("append", { sheet: coll, row: obj }); },
    async update(coll, id, obj) { await this.call("update", { sheet: coll, id, row: obj }); },
    async remove(coll, id) { await this.call("remove", { sheet: coll, id }); }
  };

  /* ---------- Seed defaults ---------- */
  function seedAccounts() {
    if (DB.accounts.length) return;
    const A = [
      ["1000","ໝວດຊັບສິນ","Asset",1],
      ["1100","ທະນາຄານ & ເງິນສົດ","Asset",0],
      ["1200","ລູກໜີ້ການຄ້າ (AR)","Asset",0],
      ["1300","ສິນຄ້າຄົງເຫຼືອ","Asset",0],
      ["1400","VAT ຮັບຄືນ (Input)","Asset",0],
      ["1500","GR/IR Clearing","Asset",0],
      ["1600","ຄ່າໃຊ້ຈ່າຍລ່ວງໜ້າ","Asset",0],
      ["1700","ຊັບສິນຖາວອນ","Asset",0],
      ["1750","ຄ່າເສື່ອມສະສົມ","Asset",0],
      ["2000","ໝວດໜີ້ສິນ","Liability",1],
      ["2100","ເຈົ້າໜີ້ການຄ້າ (AP)","Liability",0],
      ["2200","VAT ຕ້ອງຈ່າຍ (Output)","Liability",0],
      ["2300","PIT ຄ້າງຈ່າຍ","Liability",0],
      ["2350","LSSO ຄ້າງຈ່າຍ","Liability",0],
      ["2400","WHT ຄ້າງຈ່າຍ","Liability",0],
      ["2500","ເງິນຮັບລ່ວງໜ້າ","Liability",0],
      ["3000","ໝວດທຶນ","Equity",1],
      ["3100","ທຶນເຈົ້າຂອງ","Equity",0],
      ["3150","ຖອນທຶນ","Equity",0],
      ["3200","ກຳໄລສະສົມ","Equity",0],
      ["3900","Opening Balance Equity","Equity",0],
      ["4000","ໝວດລາຍຮັບ","Revenue",1],
      ["4100","ລາຍຮັບຈາກການຂາຍ","Revenue",0],
      ["4200","ລາຍຮັບອື່ນ","Revenue",0],
      ["4900","ກຳໄລ/ຂາດທຶນ ອັດຕາແລກປ່ຽນ","Revenue",0],
      ["5000","ໝວດຄ່າໃຊ້ຈ່າຍ","Expense",1],
      ["5100","ຕົ້ນທຶນຂາຍ (COGS)","Expense",0],
      ["5200","ຄ່າໃຊ້ຈ່າຍທົ່ວໄປ","Expense",0],
      ["5300","ເງິນເດືອນ","Expense",0],
      ["5350","LSSO ນາຍຈ້າງ","Expense",0],
      ["5400","ຄ່າເສື່ອມລາຄາ","Expense",0],
      ["5500","ໜີ້ສູນ (Bad Debt)","Expense",0]
    ];
    A.forEach(([code,name,type,isHeader]) => {
      DB.accounts.push({ id: "acc_"+code, code, name, type, is_header: isHeader, is_active: 1 });
    });
  }

  function seedTax() {
    if (DB.taxcodes.length) return;
    DB.taxcodes.push({ id:"tax_out10", name:"VAT ຂາຍ 10%", rate:10, type:"Output" });
    DB.taxcodes.push({ id:"tax_in10",  name:"VAT ຊື້ 10%",  rate:10, type:"Input" });
    DB.taxcodes.push({ id:"tax_0",     name:"ບໍ່ມີ VAT",     rate:0,  type:"None" });
  }

  function seedSettings() {
    if (DB.settings.length) return;
    const c = ERP_CONFIG.COMPANY;
    DB.settings.push({ id:"company", name:c.name, tin:c.tin, currency:c.currency, vat_rate:c.vat_rate, fiscal_year_start:c.fiscal_year_start, lock_date:"" });
  }

  function seedBank() {
    if (DB.bank_accounts.length) return;
    DB.bank_accounts.push({ id:"bank_main", name:"ທະນາຄານ BCEL - ຫຼັກ", number:"010-12-00-123456", currency:"LAK", gl_account:"1100", opening_balance:0, created_at:new Date().toISOString() });
  }

  function seedDemo() {
    if (!ERP_CONFIG.SEED_DEMO_DATA) return;
    if (DB.customers.length || DB.items.length) return;
    DB.customers.push({ id:uid("cust"), name:"ຮ້ານ ຄຳໃບ", tin:"2233445566", phone:"020 5555 1111", email:"khambai@example.la", address:"ນະຄອນຫຼວງວຽງຈັນ", currency:"LAK", terms:30, ar_account:"1200", credit_limit:50000000, status:"active", created_at:new Date().toISOString() });
    DB.customers.push({ id:uid("cust"), name:"ບໍລິສັດ ພູສີ ຈຳກັດ", tin:"9988776655", phone:"020 7777 2222", email:"phousi@example.la", address:"ຫຼວງພະບາງ", currency:"LAK", terms:15, ar_account:"1200", credit_limit:30000000, status:"active", created_at:new Date().toISOString() });
    DB.vendors.push({ id:uid("vend"), name:"ໂຮງງານ ນ້ຳດື່ມ ດາວ", tin:"1122334455", phone:"021 222 333", email:"dao@example.la", address:"ວຽງຈັນ", currency:"LAK", terms:30, ap_account:"2100", status:"active", created_at:new Date().toISOString() });
    const it1 = { id:uid("item"), sku:"WTR-500", name:"ນ້ຳດື່ມ 500ml (ແພັກ)", type:"stock", uom:"ແພັກ", sell_price:35000, buy_price:22000, income_account:"4100", inventory_account:"1300", cogs_account:"5100", tax_code:"tax_out10", reorder_point:20, qty:0, avg_cost:0, status:"active" };
    const it2 = { id:uid("item"), sku:"SRV-DEL", name:"ຄ່າບໍລິການຂົນສົ່ງ", type:"service", uom:"ຄັ້ງ", sell_price:50000, buy_price:0, income_account:"4100", inventory_account:"", cogs_account:"", tax_code:"tax_out10", reorder_point:0, qty:0, avg_cost:0, status:"active" };
    DB.items.push(it1, it2);
    // opening stock for it1 (100 packs @ 22,000)
    DB.stock_moves.push({ id:uid("mv"), date:new Date().toISOString().slice(0,10), item_id:it1.id, type:"in", qty:100, unit_cost:22000, ref_type:"OPENING", ref_id:"", seq:1 });
    it1.qty = 100; it1.avg_cost = 22000;
    // Opening inventory needs a balancing JE (Dr Inventory / Cr Opening Balance Equity)
    const openVal = 100 * 22000;
    const yr = new Date().getFullYear();
    DB.journal_entries.push({ id:"je_open", number:"JE-"+yr+"-0001", date:new Date().toISOString().slice(0,10), source_type:"OPENING", source_id:"", memo:"ຍອດສິນຄ້າຍົກມາ", total_debit:openVal, total_credit:openVal, status:"posted", created_at:new Date().toISOString() });
    DB.journal_lines.push({ id:"jl_open1", je_id:"je_open", account:"1300", account_name:"1300 ສິນຄ້າຄົງເຫຼືອ", debit:openVal, credit:0, memo:"ສິນຄ້າຍົກມາ" });
    DB.journal_lines.push({ id:"jl_open2", je_id:"je_open", account:"3900", account_name:"3900 Opening Balance Equity", debit:0, credit:openVal, memo:"ຍອດຍົກມາ" });
    DB.employees.push({ id:uid("emp"), name:"ນາງ ສົມໃຈ", dept:"ຂາຍ", position:"ພະນັກງານຂາຍ", phone:"020 9999 0000", start_date:"2024-01-15", base_salary:4500000, status:"active" });
  }

  async function persistNew(coll, obj) {
    try { await backend.append(coll, obj); }
    catch (e) { console.error(e); UI && UI.toast && UI.toast("ບັນທຶກຂຶ້ນ cloud ບໍ່ສຳເລັດ: " + e.message, "err"); }
  }

  const Store = {
    mode: "demo",
    async boot() {
      const url = (ERP_CONFIG.APPS_SCRIPT_URL || "").trim();
      if (url) { RemoteBackend.url = url; backend = RemoteBackend; this.mode = "cloud"; }
      else { backend = LocalBackend; this.mode = "demo"; }

      DB = await backend.loadAll();
      COLLECTIONS.forEach(c => { if (!Array.isArray(DB[c])) DB[c] = []; });

      // seed defaults if empty (and push to backend)
      const before = JSON.stringify(DB);
      seedAccounts(); seedTax(); seedSettings(); seedBank(); seedDemo();
      if (JSON.stringify(DB) !== before) {
        if (backend === LocalBackend) LocalBackend.persist();
        else {
          // push seeded rows to sheet
          for (const c of COLLECTIONS) for (const row of DB[c]) { try { await backend.append(c, row); } catch(e){ console.warn(e);} }
        }
      }
      return this.mode;
    },
    collections() { return COLLECTIONS.slice(); },
    all(coll) { return (DB[coll] || []).slice(); },
    raw(coll) { return DB[coll] || (DB[coll] = []); },
    get(coll, id) { return (DB[coll] || []).find(r => r.id === id) || null; },
    where(coll, fn) { return (DB[coll] || []).filter(fn); },

    insert(coll, obj) {
      if (!obj.id) obj.id = uid(coll.slice(0, 3));
      DB[coll].push(obj);
      persistNew(coll, obj);
      return obj;
    },
    update(coll, id, patch) {
      const row = this.get(coll, id);
      if (!row) return null;
      Object.assign(row, patch);
      if (backend === LocalBackend) LocalBackend.persist();
      else backend.update(coll, id, row).catch(e => console.error(e));
      return row;
    },
    remove(coll, id) {
      DB[coll] = (DB[coll] || []).filter(r => r.id !== id);
      if (backend === LocalBackend) LocalBackend.persist();
      else backend.remove(coll, id).catch(e => console.error(e));
    },
    uid,
    // wipe demo data (only local)
    resetDemo() { localStorage.removeItem(LS_KEY); }
  };

  window.Store = Store;
})();


/* ===== accounting.js ===== */
/* ============================================================
   LaoBooks ERP – Accounting Engine
   Double-entry journal, VAT, FIFO costing, gap-free numbering.
   ============================================================ */
(function () {
  const round = (n) => Math.round((Number(n) || 0) * 100) / 100;

  /* ---------- Chart of accounts helpers ---------- */
  function acc(code) { return Store.where("accounts", a => a.code === String(code))[0] || null; }
  function accName(code) { const a = acc(code); return a ? a.code + " " + a.name : code; }

  /* ---------- Numbering (gap-free per year) ---------- */
  function docYear(d) { return (d || new Date().toISOString()).slice(0, 4); }
  function nextNumber(prefix, collection, dateStr) {
    const yr = docYear(dateStr);
    const rows = Store.all(collection).filter(r => (r.number || "").startsWith(prefix + "-" + yr + "-"));
    let max = 0;
    rows.forEach(r => {
      const n = parseInt((r.number || "").split("-").pop(), 10);
      if (!isNaN(n) && n > max) max = n;
    });
    return prefix + "-" + yr + "-" + String(max + 1).padStart(4, "0");
  }

  /* ---------- Tax ---------- */
  function taxRate(taxCodeId) {
    const t = Store.get("taxcodes", taxCodeId);
    return t ? Number(t.rate) || 0 : 0;
  }

  /* ---------- FIFO lots ---------- */
  // Rebuild remaining lots for an item by replaying stock_moves in order.
  function lotsFor(itemId) {
    const moves = Store.where("stock_moves", m => m.item_id === itemId)
      .sort((a, b) => (a.date + (a.seq||0)).localeCompare(b.date + (b.seq||0)));
    const lots = [];
    moves.forEach(m => {
      if (m.type === "in") lots.push({ qty: Number(m.qty), cost: Number(m.unit_cost) });
      else {
        let need = Number(m.qty);
        while (need > 0 && lots.length) {
          const lot = lots[0];
          const take = Math.min(need, lot.qty);
          lot.qty -= take; need -= take;
          if (lot.qty <= 0.0000001) lots.shift();
        }
      }
    });
    return lots;
  }
  function stockQty(itemId) { return lotsFor(itemId).reduce((s, l) => s + l.qty, 0); }
  function stockValue(itemId) { return lotsFor(itemId).reduce((s, l) => s + l.qty * l.cost, 0); }

  // Consume FIFO qty and return total COGS (does not record the move).
  function computeCOGS(itemId, qty) {
    const lots = lotsFor(itemId);
    let need = Number(qty), cogs = 0;
    for (const lot of lots) {
      if (need <= 0) break;
      const take = Math.min(need, lot.qty);
      cogs += take * lot.cost; need -= take;
    }
    // if not enough stock, value the shortfall at last known cost (or 0)
    if (need > 0) {
      const last = lots.length ? lots[lots.length - 1].cost : 0;
      cogs += need * last;
    }
    return round(cogs);
  }
  function recordMove(itemId, type, qty, unitCost, refType, refId) {
    const seq = Store.all("stock_moves").length + 1;
    Store.insert("stock_moves", {
      date: new Date().toISOString().slice(0, 10),
      item_id: itemId, type, qty: Number(qty), unit_cost: Number(unitCost) || 0,
      ref_type: refType, ref_id: refId, seq
    });
    // refresh cached qty/avg on item
    const it = Store.get("items", itemId);
    if (it) {
      const q = stockQty(itemId), v = stockValue(itemId);
      Store.update("items", itemId, { qty: round(q), avg_cost: q ? round(v / q) : it.avg_cost });
    }
  }

  /* ---------- Journal ---------- */
  // lines: [{account: code, debit, credit, memo}]
  function postJournal({ date, source_type, source_id, memo, lines }) {
    const cleaned = lines
      .map(l => ({ account: String(l.account), account_name: accName(l.account), debit: round(l.debit || 0), credit: round(l.credit || 0), memo: l.memo || "" }))
      .filter(l => l.debit || l.credit);
    const td = round(cleaned.reduce((s, l) => s + l.debit, 0));
    const tc = round(cleaned.reduce((s, l) => s + l.credit, 0));
    if (Math.abs(td - tc) > 0.5) throw new Error("Journal ບໍ່ສົມດຸນ: Dr " + td + " ≠ Cr " + tc);

    // lock date check
    const s = Store.get("settings", "company");
    if (s && s.lock_date && date && date <= s.lock_date)
      throw new Error("ວັນທີ " + date + " ຢູ່ກ່ອນວັນລັອກບັນຊີ (" + s.lock_date + ")");

    const je = Store.insert("journal_entries", {
      number: nextNumber("JE", "journal_entries", date),
      date: date || new Date().toISOString().slice(0, 10),
      source_type, source_id, memo: memo || "",
      total_debit: td, total_credit: tc, status: "posted",
      created_at: new Date().toISOString()
    });
    cleaned.forEach(l => Store.insert("journal_lines", { je_id: je.id, account: l.account, account_name: l.account_name, debit: l.debit, credit: l.credit, memo: l.memo }));
    audit("post", "journal_entries", je.id, je.number + " Dr/Cr " + td);
    return je;
  }

  function reverseJournal(sourceType, sourceId, date, memo) {
    const orig = Store.where("journal_entries", j => j.source_type === sourceType && j.source_id === sourceId && j.status === "posted");
    orig.forEach(je => {
      const lines = Store.where("journal_lines", l => l.je_id === je.id)
        .map(l => ({ account: l.account, debit: l.credit, credit: l.debit, memo: "Reverse: " + (l.memo || "") }));
      postJournal({ date: date || new Date().toISOString().slice(0,10), source_type: sourceType + "_VOID", source_id: sourceId, memo: memo || ("ຍົກເລີກ " + je.number), lines });
      Store.update("journal_entries", je.id, { status: "reversed" });
    });
  }

  /* ---------- Invoice ---------- */
  function invoiceTotals(lines) {
    let sub = 0, disc = 0, vat = 0;
    lines.forEach(l => {
      const gross = (Number(l.qty) || 0) * (Number(l.price) || 0);
      const d = Number(l.discount) || 0;
      const net = gross - d;
      sub += gross; disc += d;
      vat += net * taxRate(l.tax_code) / 100;
    });
    return { subtotal: round(sub), discount: round(disc), vat: round(vat), total: round(sub - disc + vat) };
  }

  function postInvoice(inv) {
    const lines = Store.where("invoice_lines", l => l.invoice_id === inv.id);
    const t = invoiceTotals(lines);
    const lakRate = Number(inv.fx_rate) || 1;
    const scale = v => round(v * lakRate);

    const jl = [];
    jl.push({ account: "1200", debit: scale(t.total), credit: 0, memo: "ລູກໜີ້ " + inv.number }); // AR
    // revenue per line (net of discount) grouped by income account
    const revByAcc = {};
    lines.forEach(l => {
      const it = Store.get("items", l.item_id);
      const racc = (it && it.income_account) || "4100";
      const net = (Number(l.qty) || 0) * (Number(l.price) || 0) - (Number(l.discount) || 0);
      revByAcc[racc] = (revByAcc[racc] || 0) + net;
    });
    Object.entries(revByAcc).forEach(([a, v]) => jl.push({ account: a, debit: 0, credit: scale(v), memo: "ລາຍຮັບຂາຍ" }));
    if (t.vat) jl.push({ account: "2200", debit: 0, credit: scale(t.vat), memo: "VAT ຂາຍ" });

    // COGS + inventory for stock items
    let totalCogs = 0;
    lines.forEach(l => {
      const it = Store.get("items", l.item_id);
      if (it && it.type === "stock") {
        const cogs = computeCOGS(it.id, l.qty);
        if (cogs) {
          totalCogs += cogs;
          recordMove(it.id, "out", l.qty, cogs / (Number(l.qty) || 1), "INVOICE", inv.id);
        }
      }
    });
    if (totalCogs) {
      jl.push({ account: "5100", debit: round(totalCogs), credit: 0, memo: "ຕົ້ນທຶນຂາຍ" });
      jl.push({ account: "1300", debit: 0, credit: round(totalCogs), memo: "ຕັດສິນຄ້າ (FIFO)" });
    }

    const je = postJournal({ date: inv.date, source_type: "INVOICE", source_id: inv.id, memo: "Invoice " + inv.number, lines: jl });
    Store.update("invoices", inv.id, Object.assign({ status: "posted", je_id: je.id, paid: 0 }, t));
    return je;
  }

  /* ---------- Bill ---------- */
  function billTotals(lines) {
    let sub = 0, vat = 0;
    lines.forEach(l => {
      const net = (Number(l.qty) || 1) * (Number(l.price) || 0);
      sub += net; vat += net * taxRate(l.tax_code) / 100;
    });
    return { subtotal: round(sub), vat: round(vat), total: round(sub + vat) };
  }
  function postBill(bill) {
    const lines = Store.where("bill_lines", l => l.bill_id === bill.id);
    const t = billTotals(lines);
    const rate = Number(bill.fx_rate) || 1;
    const scale = v => round(v * rate);
    const jl = [];
    lines.forEach(l => {
      const net = (Number(l.qty) || 1) * (Number(l.price) || 0);
      const a = l.account_id || "5200";
      jl.push({ account: a, debit: scale(net), credit: 0, memo: l.description || "ຄ່າໃຊ້ຈ່າຍ" });
      // if expense account is inventory, add stock
      if (a === "1300" && l.item_id) recordMove(l.item_id, "in", l.qty, l.price, "BILL", bill.id);
    });
    if (t.vat) jl.push({ account: "1400", debit: scale(t.vat), credit: 0, memo: "VAT ຊື້" });
    jl.push({ account: "2100", debit: 0, credit: scale(t.total), memo: "ເຈົ້າໜີ້ " + bill.number });
    const je = postJournal({ date: bill.date, source_type: "BILL", source_id: bill.id, memo: "Bill " + bill.number, lines: jl });
    Store.update("bills", bill.id, Object.assign({ status: "posted", je_id: je.id, paid: 0 }, t));
    return je;
  }

  /* ---------- Payments ---------- */
  function receivePayment({ invoice_id, bank_id, amount, date }) {
    const inv = Store.get("invoices", invoice_id);
    const bank = Store.get("bank_accounts", bank_id);
    const amt = round(amount);
    const pay = Store.insert("payments", {
      number: nextNumber("RC", "payments", date), date, type: "receive",
      party_type: "customer", party_id: inv.customer_id, bank_account: bank_id,
      ref_type: "INVOICE", ref_id: invoice_id, amount: amt, currency: "LAK", status: "posted"
    });
    postJournal({ date, source_type: "PAYMENT", source_id: pay.id, memo: "ຮັບເງິນ " + inv.number,
      lines: [ { account: bank.gl_account, debit: amt, credit: 0, memo: "ຮັບເຂົ້າ " + bank.name }, { account: "1200", debit: 0, credit: amt, memo: "ຫຼຸດລູກໜີ້" } ] });
    const paid = round((Number(inv.paid) || 0) + amt);
    Store.update("invoices", invoice_id, { paid, status: paid >= Number(inv.total) - 0.5 ? "paid" : "partial" });
    return pay;
  }
  function payBill({ bill_id, bank_id, amount, date }) {
    const bill = Store.get("bills", bill_id);
    const bank = Store.get("bank_accounts", bank_id);
    const amt = round(amount);
    const pay = Store.insert("payments", {
      number: nextNumber("PV", "payments", date), date, type: "pay",
      party_type: "vendor", party_id: bill.vendor_id, bank_account: bank_id,
      ref_type: "BILL", ref_id: bill_id, amount: amt, currency: "LAK", status: "posted"
    });
    postJournal({ date, source_type: "PAYMENT", source_id: pay.id, memo: "ຈ່າຍ " + bill.number,
      lines: [ { account: "2100", debit: amt, credit: 0, memo: "ຫຼຸດເຈົ້າໜີ້" }, { account: bank.gl_account, debit: 0, credit: amt, memo: "ຈ່າຍຈາກ " + bank.name } ] });
    const paid = round((Number(bill.paid) || 0) + amt);
    Store.update("bills", bill_id, { paid, status: paid >= Number(bill.total) - 0.5 ? "paid" : "partial" });
    return pay;
  }

  /* ---------- Reporting aggregations ---------- */
  function accountMovements() {
    // returns {code: {debit, credit}}
    const map = {};
    Store.all("journal_lines").forEach(l => {
      const je = Store.get("journal_entries", l.je_id);
      if (!je || je.status === "reversed") { /* still include reversed? keep for audit but exclude from balance */ }
      if (je && je.status !== "posted") return;
      if (!map[l.account]) map[l.account] = { debit: 0, credit: 0 };
      map[l.account].debit += Number(l.debit) || 0;
      map[l.account].credit += Number(l.credit) || 0;
    });
    return map;
  }
  function accountBalance(code) {
    const m = accountMovements()[String(code)] || { debit: 0, credit: 0 };
    const a = acc(code);
    const type = a ? a.type : "Asset";
    // Asset/Expense: debit-normal ; Liability/Equity/Revenue: credit-normal
    if (type === "Asset" || type === "Expense") return round(m.debit - m.credit);
    return round(m.credit - m.debit);
  }
  function sumByType(type) {
    return Store.where("accounts", a => a.type === type && !a.is_header)
      .reduce((s, a) => s + accountBalance(a.code), 0);
  }
  function plData() {
    const revenue = sumByType("Revenue");
    const expense = sumByType("Expense");
    const cogs = accountBalance("5100");
    const grossProfit = round(revenue - cogs);
    const otherExp = round(expense - cogs);
    return { revenue: round(revenue), cogs: round(cogs), grossProfit, expense: round(otherExp), net: round(revenue - expense) };
  }
  function arOutstanding() { return Store.where("invoices", i => i.status === "posted" || i.status === "partial").reduce((s, i) => s + (Number(i.total) - (Number(i.paid) || 0)), 0); }
  function apOutstanding() { return Store.where("bills", b => b.status === "posted" || b.status === "partial").reduce((s, b) => s + (Number(b.total) - (Number(b.paid) || 0)), 0); }
  function cashBalance() { return Store.all("bank_accounts").reduce((s, b) => s + accountBalance(b.gl_account) + (Number(b.opening_balance)||0), 0); }

  function aging(kind) {
    // kind = 'ar' or 'ap'
    const rows = kind === "ar"
      ? Store.where("invoices", i => (i.status === "posted" || i.status === "partial"))
      : Store.where("bills", b => (b.status === "posted" || b.status === "partial"));
    const buckets = { "0-30": 0, "31-60": 0, "61-90": 0, ">90": 0 };
    const today = new Date();
    rows.forEach(r => {
      const bal = Number(r.total) - (Number(r.paid) || 0);
      if (bal <= 0) return;
      const due = new Date(r.due_date || r.date);
      const days = Math.floor((today - due) / 86400000);
      if (days <= 30) buckets["0-30"] += bal;
      else if (days <= 60) buckets["31-60"] += bal;
      else if (days <= 90) buckets["61-90"] += bal;
      else buckets[">90"] += bal;
    });
    return buckets;
  }

  /* ---------- Audit ---------- */
  function audit(action, entity, entity_id, detail) {
    Store.insert("audit_log", { ts: new Date().toISOString(), user: "Taow", action, entity, entity_id, detail: detail || "" });
  }

  window.Acc = {
    round, acc, accName, nextNumber, taxRate,
    lotsFor, stockQty, stockValue, computeCOGS, recordMove,
    postJournal, reverseJournal,
    invoiceTotals, postInvoice, billTotals, postBill,
    receivePayment, payBill,
    accountMovements, accountBalance, sumByType, plData,
    arOutstanding, apOutstanding, cashBalance, aging, audit
  };
})();

/* ============================================================
   LaoBooks ERP – UI helpers
   ============================================================ */
(function () {
  const money = (n, cur) => {
    const v = Number(n) || 0;
    return v.toLocaleString("en-US", { maximumFractionDigits: 0 }) + " " + (cur || "₭");
  };
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const today = () => new Date().toISOString().slice(0, 10);
  const fmtDate = (d) => d ? String(d).slice(0, 10) : "";

  function toast(msg, kind) {
    const el = document.createElement("div");
    el.className = "toast " + (kind || "");
    el.textContent = msg;
    document.getElementById("toastRoot").appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transition = ".3s"; setTimeout(() => el.remove(), 300); }, 3000);
  }

  const STATUS = {
    draft: ["gray", "ຮ່າງ"], posted: ["blue", "ບັນທຶກແລ້ວ"], paid: ["green", "ຈ່າຍແລ້ວ"],
    partial: ["amber", "ຈ່າຍບາງສ່ວນ"], overdue: ["red", "ເກີນກຳນົດ"], void: ["gray", "ຍົກເລີກ"],
    reversed: ["gray", "ກັບລາຍການ"], active: ["green", "ໃຊ້ງານ"], inactive: ["gray", "ປິດ"],
    accepted: ["green", "ຕົກລົງ"], sent: ["blue", "ສົ່ງແລ້ວ"], lost: ["red", "ບໍ່ເອົາ"], open: ["amber", "ເປີດ"]
  };
  function statusBadge(s) {
    const [c, t] = STATUS[s] || ["gray", s || "-"];
    return `<span class="badge ${c}">${esc(t)}</span>`;
  }

  // Generic modal. content = html string, opts.onMount(root), opts.title, opts.wide
  function modal(title, contentHTML, opts) {
    opts = opts || {};
    const root = document.getElementById("modalRoot");
    root.innerHTML = `
      <div class="modal-bg">
        <div class="modal" style="max-width:${opts.wide ? "920px" : "640px"}">
          <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200">
            <h3 class="font-semibold text-lg">${esc(title)}</h3>
            <button data-close class="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button>
          </div>
          <div class="px-5 py-4" data-body>${contentHTML}</div>
        </div>
      </div>`;
    const bg = root.querySelector(".modal-bg");
    const close = () => { root.innerHTML = ""; };
    bg.addEventListener("mousedown", e => { if (e.target === bg) close(); });
    root.querySelector("[data-close]").addEventListener("click", close);
    if (opts.onMount) opts.onMount(root.querySelector("[data-body]"), close);
    return { root, close };
  }

  function confirmDialog(msg, onYes) {
    modal("ຢືນຢັນ", `<p class="text-slate-600">${esc(msg)}</p>
      <div class="flex justify-end gap-2 mt-5">
        <button class="btn btn-ghost" data-no>ຍົກເລີກ</button>
        <button class="btn btn-primary" data-yes>ຕົກລົງ</button>
      </div>`, { onMount: (body, close) => {
        body.querySelector("[data-no]").onclick = close;
        body.querySelector("[data-yes]").onclick = () => { close(); onYes(); };
      }});
  }

  // page header with title + actions
  function pageHead(title, subtitle, actionsHTML) {
    return `<div class="flex flex-wrap items-start justify-between gap-3 mb-5">
      <div><h1 class="text-2xl font-bold text-slate-800">${esc(title)}</h1>
      ${subtitle ? `<p class="text-slate-500 text-sm mt-0.5">${esc(subtitle)}</p>` : ""}</div>
      <div class="flex gap-2">${actionsHTML || ""}</div></div>`;
  }

  function kpi(label, value, sub, color) {
    return `<div class="kpi">
      <div class="label">${esc(label)}</div>
      <div class="value" style="color:${color || "#0f172a"}">${value}</div>
      ${sub ? `<div class="hint mt-1">${sub}</div>` : ""}</div>`;
  }

  // Build a simple table. cols=[{h, key|render, cls}], rows=array
  function table(cols, rows, opts) {
    opts = opts || {};
    const head = cols.map(c => `<th class="${c.cls || ""}">${esc(c.h)}</th>`).join("");
    const body = rows.length ? rows.map(r => {
      const tds = cols.map(c => {
        const val = c.render ? c.render(r) : esc(r[c.key]);
        return `<td class="${c.cls || ""}">${val}</td>`;
      }).join("");
      return `<tr ${opts.rowClick ? 'style="cursor:pointer"' : ""} data-id="${esc(r.id)}">${tds}</tr>`;
    }).join("") : `<tr><td colspan="${cols.length}" class="text-center text-slate-400 py-8">ຍັງບໍ່ມີຂໍ້ມູນ</td></tr>`;
    return `<div class="card overflow-hidden"><div class="overflow-x-auto"><table class="data"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div></div>`;
  }

  window.UI = { money, esc, today, fmtDate, toast, statusBadge, modal, confirmDialog, pageHead, kpi, table };
})();

(function () {
  const view = () => document.getElementById("view");
  const M = UI.money, E = UI.esc;

  /* ---------------- Navigation ---------------- */
  const NAV = [
    { group: "ພາບລວມ", items: [["dashboard", "🏠", "01 · Dashboard"]] },
    { group: "ຂາຍ", items: [["customers", "👥", "02 · ລູກຄ້າ & ໃບສະເໜີ"], ["invoices", "🧾", "03 · Invoice & CN"]] },
    { group: "ຊື້", items: [["vendors", "🏭", "04 · ຜູ້ສະໜອງ & PO"], ["bills", "📥", "05 · Bill & ຄ່າໃຊ້ຈ່າຍ"]] },
    { group: "ສິນຄ້າ & ເງິນ", items: [["inventory", "📦", "06 · ສິນຄ້າຄົງເຫຼືອ"], ["banking", "🏦", "07 · ທະນາຄານ & ເງິນສົດ"]] },
    { group: "ບັນຊີ", items: [["gl", "📚", "08 · ບັນຊີແຍກປະເພດ"], ["assets", "🏢", "09 · ຊັບສິນຖາວອນ"]] },
    { group: "ຄົນ & ແຜນ", items: [["payroll", "💼", "10 · ເງິນເດືອນ & HR"], ["budget", "🎯", "11 · ງົບປະມານ"]] },
    { group: "ລາຍງານ", items: [["reports", "📊", "12 · ລາຍງານ"], ["settings", "⚙️", "ຕັ້ງຄ່າ & Governance"]] }
  ];
  function buildNav() {
    const nav = document.getElementById("nav");
    nav.innerHTML = NAV.map(g =>
      `<div class="nav-group">${E(g.group)}</div>` +
      g.items.map(([route, ico, label]) =>
        `<a class="nav-item" href="#/${route}"><span class="ico">${ico}</span><span>${E(label)}</span></a>`).join("")
    ).join("");
  }
  function setActive(route) {
    document.querySelectorAll(".nav-item").forEach(a =>
      a.classList.toggle("active", a.getAttribute("href") === "#/" + route));
  }

  /* ---------------- Form helpers ---------------- */
  function fieldInput(f, val) {
    val = val == null ? (f.default != null ? f.default : "") : val;
    if (f.type === "select") {
      const opts = (f.options || []).map(o => `<option value="${E(o.value)}" ${String(o.value) === String(val) ? "selected" : ""}>${E(o.label)}</option>`).join("");
      return `<select class="input" name="${f.name}">${opts}</select>`;
    }
    if (f.type === "textarea") return `<textarea class="input" name="${f.name}" rows="2">${E(val)}</textarea>`;
    return `<input class="input" name="${f.name}" type="${f.type || "text"}" value="${E(val)}" ${f.step ? `step="${f.step}"` : ""}/>`;
  }
  function formModal(title, fields, values, onSave) {
    values = values || {};
    const grid = fields.map(f => `<div class="${f.col || "col-span-2"}"><label class="field">${E(f.label)}</label>${fieldInput(f, values[f.name])}</div>`).join("");
    UI.modal(title, `<form data-form><div class="grid grid-cols-2 gap-3">${grid}</div>
      <div class="flex justify-end gap-2 mt-5"><button type="button" class="btn btn-ghost" data-cancel>ຍົກເລີກ</button><button class="btn btn-primary">ບັນທຶກ</button></div></form>`,
      { onMount: (body, close) => {
        body.querySelector("[data-cancel]").onclick = close;
        body.querySelector("[data-form]").onsubmit = e => {
          e.preventDefault();
          const data = {};
          fields.forEach(f => { const el = body.querySelector(`[name="${f.name}"]`); data[f.name] = f.type === "number" ? (parseFloat(el.value) || 0) : el.value; });
          onSave(data, close);
        };
      }});
  }

  /* ---------------- Document (line item) editor ---------------- */
  // config: title, lineType 'item'|'expense', parties [{value,label}], onSave(header, lines)
  function docEditor(cfg) {
    let lines = cfg.lines ? cfg.lines.slice() : [];
    const items = Store.where("items", i => i.status === "active");
    const expAccts = Store.where("accounts", a => !a.is_header && (a.type === "Expense" || a.code === "1300"));
    const taxes = Store.all("taxcodes");
    const h = cfg.header || {};

    const partyOptions = cfg.parties.map(p => `<option value="${E(p.value)}" ${p.value === h.party ? "selected" : ""}>${E(p.label)}</option>`).join("");
    const html = `
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><label class="field">${E(cfg.partyLabel)}</label><select class="input" id="d-party">${partyOptions}</select></div>
        <div><label class="field">ວັນທີ</label><input class="input" id="d-date" type="date" value="${h.date || UI.today()}"/></div>
        <div><label class="field">ກຳນົດຈ່າຍ (ວັນ)</label><input class="input" id="d-terms" type="number" value="${h.terms != null ? h.terms : 30}"/></div>
        <div><label class="field">ໝາຍເຫດ</label><input class="input" id="d-note" value="${E(h.note || "")}"/></div>
      </div>
      <div class="border border-slate-200 rounded-lg overflow-hidden">
        <table class="data"><thead><tr>
          <th>${cfg.lineType === "item" ? "ສິນຄ້າ/ບໍລິການ" : "ບັນຊີ / ລາຍລະອຽດ"}</th>
          <th style="width:80px" class="num">ຈຳນວນ</th><th style="width:110px" class="num">ລາຄາ</th>
          ${cfg.lineType === "item" ? '<th style="width:90px" class="num">ຫຼຸດ</th>' : ""}
          <th style="width:110px">VAT</th><th style="width:110px" class="num">ລວມ</th><th style="width:30px"></th>
        </tr></thead><tbody id="d-lines"></tbody></table>
      </div>
      <button class="btn btn-ghost btn-sm mt-2" id="d-add">+ ເພີ່ມແຖວ</button>
      <div class="flex justify-end mt-3"><div class="text-right text-sm space-y-1">
        <div>ຍອດກ່ອນ VAT: <b id="d-sub">0</b></div>
        <div>VAT: <b id="d-vat">0</b></div>
        <div class="text-lg">ຍອດລວມ: <b id="d-total" class="text-brand-700">0</b></div>
      </div></div>
      <div class="flex justify-end gap-2 mt-4">
        <button class="btn btn-ghost" data-cancel>ຍົກເລີກ</button>
        <button class="btn btn-primary" id="d-save">ບັນທຶກ (ຮ່າງ)</button>
      </div>`;

    UI.modal(cfg.title, html, { wide: true, onMount: (body, close) => {
      const $ = s => body.querySelector(s);
      function blankLine() { return cfg.lineType === "item" ? { item_id: items[0] ? items[0].id : "", qty: 1, price: items[0] ? items[0].sell_price : 0, discount: 0, tax_code: taxes[0].id } : { account_id: "5200", description: "", qty: 1, price: 0, tax_code: cfg.defaultTax || "tax_0" }; }
      function renderLines() {
        const tb = $("#d-lines");
        tb.innerHTML = lines.map((l, idx) => {
          const sel = cfg.lineType === "item"
            ? `<select class="input" data-f="item_id" data-i="${idx}">${items.map(it => `<option value="${it.id}" ${it.id === l.item_id ? "selected" : ""}>${E(it.name)}</option>`).join("")}</select>`
            : `<select class="input" data-f="account_id" data-i="${idx}">${expAccts.map(a => `<option value="${a.code}" ${a.code === l.account_id ? "selected" : ""}>${E(a.code + " " + a.name)}</option>`).join("")}</select>
               <input class="input mt-1" data-f="description" data-i="${idx}" placeholder="ລາຍລະອຽດ" value="${E(l.description || "")}"/>`;
          const taxSel = `<select class="input" data-f="tax_code" data-i="${idx}">${taxes.map(t => `<option value="${t.id}" ${t.id === l.tax_code ? "selected" : ""}>${E(t.name)}</option>`).join("")}</select>`;
          const gross = (Number(l.qty) || 0) * (Number(l.price) || 0) - (Number(l.discount) || 0);
          return `<tr>
            <td>${sel}</td>
            <td><input class="input num" data-f="qty" data-i="${idx}" type="number" value="${l.qty}"/></td>
            <td><input class="input num" data-f="price" data-i="${idx}" type="number" value="${l.price}"/></td>
            ${cfg.lineType === "item" ? `<td><input class="input num" data-f="discount" data-i="${idx}" type="number" value="${l.discount || 0}"/></td>` : ""}
            <td>${taxSel}</td>
            <td class="num">${M(gross)}</td>
            <td><button class="text-red-500" data-del="${idx}">✕</button></td>
          </tr>`;
        }).join("");
        tb.querySelectorAll("input,select").forEach(el => {
          el.onchange = () => {
            const i = +el.dataset.i, f = el.dataset.f;
            let v = el.value;
            if (["qty", "price", "discount"].includes(f)) v = parseFloat(v) || 0;
            lines[i][f] = v;
            if (f === "item_id") { const it = Store.get("items", v); if (it) { lines[i].price = it.sell_price; lines[i].tax_code = it.tax_code; } }
            renderLines(); calc();
          };
        });
        tb.querySelectorAll("[data-del]").forEach(b => b.onclick = () => { lines.splice(+b.dataset.del, 1); renderLines(); calc(); });
        calc();
      }
      function calc() {
        const t = cfg.lineType === "item" ? Acc.invoiceTotals(lines) : Acc.billTotals(lines);
        $("#d-sub").textContent = M(t.subtotal - (t.discount || 0));
        $("#d-vat").textContent = M(t.vat);
        $("#d-total").textContent = M(t.total);
      }
      $("#d-add").onclick = () => { lines.push(blankLine()); renderLines(); };
      body.querySelector("[data-cancel]").onclick = close;
      $("#d-save").onclick = () => {
        if (!lines.length) return UI.toast("ເພີ່ມຢ່າງໜ້ອຍ 1 ແຖວ", "warn");
        const header = { party: $("#d-party").value, date: $("#d-date").value, terms: parseInt($("#d-terms").value) || 0, note: $("#d-note").value };
        cfg.onSave(header, lines, close);
      };
      if (!lines.length) lines.push(blankLine());
      renderLines();
    }});
  }

      { name: "tin", label: "ເລກ TIN", col: "col-span-1" }, { name: "phone", label: "ເບີໂທ", col: "col-span-1" },
      { name: "email", label: "ອີເມລ", col: "col-span-1" }, { name: "terms", label: "ເງື່ອນໄຂຈ່າຍ (ວັນ)", type: "number", col: "col-span-1" },
      { name: "credit_limit", label: "ວົງເງິນເຄຣດິດ", type: "number", col: "col-span-1" }, { name: "currency", label: "ສະກຸນ", type: "select", options: [{ value: "LAK", label: "LAK ₭" }, { value: "USD", label: "USD $" }, { value: "THB", label: "THB ฿" }], col: "col-span-1" },

  function newInvoice() {
    const custs = Store.all("customers");
    if (!custs.length) return UI.toast("ເພີ່ມລູກຄ້າກ່ອນ", "warn");
    if (!Store.all("items").length) return UI.toast("ເພີ່ມສິນຄ້າກ່ອນ", "warn");
    docEditor({
      title: "ສ້າງ Invoice", lineType: "item", partyLabel: "ລູກຄ້າ",
      parties: custs.map(c => ({ value: c.id, label: c.name })),
      onSave: (h, lines, close) => {
        const cust = Store.get("customers", h.party);
        const due = new Date(new Date(h.date).getTime() + (h.terms || 0) * 86400000).toISOString().slice(0, 10);
        const inv = Store.insert("invoices", { number: Acc.nextNumber("INV", "invoices", h.date), customer_id: h.party, date: h.date, due_date: due, currency: cust.currency || "LAK", fx_rate: 1, note: h.note, status: "draft", paid: 0, created_at: new Date().toISOString() });
        lines.forEach(l => Store.insert("invoice_lines", { invoice_id: inv.id, item_id: l.item_id, qty: l.qty, price: l.price, discount: l.discount || 0, tax_code: l.tax_code }));
        // credit limit check
        const t = Acc.invoiceTotals(lines);
        const exposure = custAR(cust.id) + t.total;
        if (Number(cust.credit_limit) > 0 && exposure > Number(cust.credit_limit))
          UI.toast("⚠️ ເກີນວົງເງິນເຄຣດິດ (" + M(cust.credit_limit) + ")", "warn");
        close(); UI.toast("ສ້າງ Invoice ຮ່າງແລ້ວ", "ok"); viewInvoice(inv.id);
      }
    });
  }
  function viewInvoice(id) {
    const inv = Store.get("invoices", id);
    const cust = Store.get("customers", inv.customer_id) || {};
    const lines = Store.where("invoice_lines", l => l.invoice_id === id);
    const t = Acc.invoiceTotals(lines);
    const bal = Number(inv.total || t.total) - (Number(inv.paid) || 0);
    const linesHtml = lines.map(l => { const it = Store.get("items", l.item_id) || {}; const g = l.qty * l.price - (l.discount || 0); return `<tr><td>${E(it.name)}</td><td class="num">${l.qty}</td><td class="num">${M(l.price)}</td><td class="num">${M(l.discount || 0)}</td><td class="num">${M(g)}</td></tr>`; }).join("");
    let actions = "";
    if (inv.status === "draft") actions = `<button class="btn btn-primary" id="post">✔ Post (ສ້າງ JE)</button> <button class="btn btn-danger" id="del">ລຶບ</button>`;
    else if (inv.status !== "paid") actions = `<button class="btn btn-primary" id="receive">💰 ຮັບເງິນ</button>`;
    UI.modal("Invoice " + inv.number, `
      <div class="flex justify-between mb-3"><div><div class="font-semibold text-lg">${E(cust.name)}</div><div class="hint">${E(cust.address || "")} · TIN ${E(cust.tin || "-")}</div></div>
      <div class="text-right"><div>${UI.statusBadge(inv.status)}</div><div class="hint mt-1">ວັນທີ ${UI.fmtDate(inv.date)} · ຄົບ ${UI.fmtDate(inv.due_date)}</div></div></div>
      <table class="data"><thead><tr><th>ລາຍການ</th><th class="num">ຈຳນວນ</th><th class="num">ລາຄາ</th><th class="num">ຫຼຸດ</th><th class="num">ລວມ</th></tr></thead><tbody>${linesHtml}</tbody></table>
      <div class="flex justify-end mt-3"><div class="text-right text-sm space-y-1">
        <div>ຍອດກ່ອນ VAT: <b>${M(t.subtotal - t.discount)}</b></div><div>VAT: <b>${M(t.vat)}</b></div>
        <div class="text-lg">ຍອດລວມ: <b class="text-brand-700">${M(inv.total || t.total)}</b></div>
        <div>ຈ່າຍແລ້ວ: <b>${M(inv.paid || 0)}</b> · ຄ້າງ: <b class="${bal > 0 ? "text-red-600" : "text-green-600"}">${M(bal)}</b></div>
      </div></div>
      ${inv.je_id ? `<div class="hint mt-2">Journal: ${E((Store.get("journal_entries", inv.je_id) || {}).number || "")}</div>` : ""}

  /* ================= 10 · PAYROLL ================= */
  const PIT_BRACKETS = [[1500000, 5], [3000000, 10], [6000000, 15], [9000000, 20], [12000000, 25], [Infinity, 30]];
  function calcPIT(taxable) { let last = 0, tax = 0; for (const [cap, rate] of PIT_BRACKETS) { if (taxable > last) { const amt = Math.min(taxable, cap) - last; tax += amt * rate / 100; last = cap; } else break; } return Acc.round(tax); }
  function payroll() {
    const emps = Store.all("employees");
    const runs = Store.all("payroll").sort((a, b) => (b.period || "").localeCompare(a.period || ""));
    view().innerHTML = UI.pageHead("ເງິນເດືອນ & HR", "ໂມດູນ 10 · Payroll (ກົດໝາຍລາວ)", `<button class="btn btn-ghost" id="run">▶ ຄິດເງິນເດືອນ</button><button class="btn btn-primary" id="add">+ ພະນັກງານ</button>`) +
      `<h3 class="font-semibold mb-2">ພະນັກງານ (${emps.length})</h3>` +
      UI.table([{ h: "ຊື່", key: "name" }, { h: "ພະແນກ", key: "dept" }, { h: "ຕຳແໜ່ງ", key: "position" }, { h: "ເງິນເດືອນພື້ນຖານ", cls: "num", render: r => M(r.base_salary) }, { h: "ສະຖານະ", render: r => UI.statusBadge(r.status) }], emps) +
      `<h3 class="font-semibold mb-2 mt-6">ປະຫວັດຄິດເງິນເດືອນ</h3>` +
      UI.table([{ h: "ງວດ", key: "period" }, { h: "ພະນັກງານ", key: "count" }, { h: "ລວມສຸດທິ", cls: "num", render: r => M(r.net_total) }, { h: "PIT", cls: "num", render: r => M(r.pit_total) }, { h: "LSSO", cls: "num", render: r => M(r.lsso_total) }, { h: "ສະຖານະ", render: r => UI.statusBadge(r.status) }], runs);
    view().querySelector("#add").onclick = () => formModal("ພະນັກງານໃໝ່", [{ name: "name", label: "ຊື່" }, { name: "dept", label: "ພະແນກ", col: "col-span-1" }, { name: "position", label: "ຕຳແໜ່ງ", col: "col-span-1" }, { name: "phone", label: "ໂທ", col: "col-span-1" }, { name: "base_salary", label: "ເງິນເດືອນພື້ນຖານ", type: "number", col: "col-span-1" }, { name: "start_date", label: "ວັນເລີ່ມວຽກ", type: "date" }], { start_date: UI.today() }, (d, close) => { Store.insert("employees", Object.assign({ status: "active" }, d)); close(); payroll(); UI.toast("ເພີ່ມແລ້ວ", "ok"); });
    view().querySelector("#run").onclick = () => runPayroll();
  }
  function runPayroll() {
    const emps = Store.where("employees", e => e.status === "active");
    if (!emps.length) return UI.toast("ບໍ່ມີພະນັກງານ", "warn");
    const period = UI.today().slice(0, 7);
    let rowsHtml = "", grossT = 0, pitT = 0, lssoEmpT = 0, lssoErT = 0, netT = 0;
    const calc = emps.map(e => {
      const gross = Number(e.base_salary) || 0;
      const lssoEmp = Acc.round(gross * 0.02), lssoEr = Acc.round(gross * 0.015);
      const taxable = gross - lssoEmp;
      const pit = calcPIT(taxable);
      const net = Acc.round(gross - lssoEmp - pit);
      grossT += gross; pitT += pit; lssoEmpT += lssoEmp; lssoErT += lssoEr; netT += net;
      rowsHtml += `<tr><td>${E(e.name)}</td><td class="num">${M(gross)}</td><td class="num">${M(pit)}</td><td class="num">${M(lssoEmp)}</td><td class="num">${M(net)}</td></tr>`;
      return { e, gross, lssoEmp, lssoEr, pit, net };
    });
    UI.modal("ຄິດເງິນເດືອນ ງວດ " + period, `<table class="data"><thead><tr><th>ພະນັກງານ</th><th class="num">Gross</th><th class="num">PIT</th><th class="num">LSSO 2%</th><th class="num">ສຸດທິ</th></tr></thead><tbody>${rowsHtml}
      <tr class="font-bold bg-slate-50"><td>ລວມ</td><td class="num">${M(grossT)}</td><td class="num">${M(pitT)}</td><td class="num">${M(lssoEmpT)}</td><td class="num">${M(netT)}</td></tr></tbody></table>
      <p class="hint mt-2">LSSO ນາຍຈ້າງ 1.5% = ${M(lssoErT)} (ຄ່າໃຊ້ຈ່າຍ)</p>
      <div class="flex justify-end gap-2 mt-4"><button class="btn btn-ghost" data-cancel>ຍົກເລີກ</button><button class="btn btn-primary" id="pp">✔ Post → GL</button></div>`, { wide: true, onMount: (body, close) => {
        body.querySelector("[data-cancel]").onclick = close;
        body.querySelector("#pp").onclick = () => {
          Acc.postJournal({ date: UI.today(), source_type: "PAYROLL", source_id: period, memo: "ເງິນເດືອນ " + period, lines: [
            { account: "5300", debit: grossT, credit: 0, memo: "ເງິນເດືອນ" },
            { account: "5350", debit: lssoErT, credit: 0, memo: "LSSO ນາຍຈ້າງ" },
            { account: "2300", debit: 0, credit: pitT, memo: "PIT ຄ້າງຈ່າຍ" },
            { account: "2350", debit: 0, credit: Acc.round(lssoEmpT + lssoErT), memo: "LSSO ຄ້າງຈ່າຍ" },
            { account: "1100", debit: 0, credit: netT, memo: "ຈ່າຍເງິນເດືອນສຸດທິ" }
          ]});
          Store.insert("payroll", { period, count: emps.length, gross_total: grossT, net_total: netT, pit_total: pitT, lsso_total: Acc.round(lssoEmpT + lssoErT), status: "posted", created_at: new Date().toISOString() });
          close(); payroll(); UI.toast("Post ເງິນເດືອນສຳເລັດ", "ok");
        };
      }});
  }

      <div class="card p-5 mb-5 max-w-lg"><h3 class="font-semibold mb-3">🧾 VAT Return (ຍືນ DRD)</h3>
        <div class="space-y-1 text-sm">${plRow("Output VAT (ຂາຍ)", vatOut)}${plRow("Input VAT (ຊື້)", -vatIn)}${plRow("VAT ຕ້ອງຍືນ", vatOut - vatIn, true)}</div></div>
      <div class="card p-5"><h3 class="font-semibold mb-3">🛡️ Audit Log (ລ່າສຸດ)</h3>
        <table class="data"><thead><tr><th>ເວລາ</th><th>ຜູ້ໃຊ້</th><th>ການກະທຳ</th><th>ລາຍລະອຽດ</th></tr></thead><tbody>
        ${audit.map(a => `<tr><td>${E((a.ts || "").slice(0, 16).replace("T", " "))}</td><td>${E(a.user)}</td><td>${E(a.action)} · ${E(a.entity)}</td><td>${E(a.detail)}</td></tr>`).join("") || '<tr><td colspan=4 class="text-center text-slate-400 py-4">ຍັງບໍ່ມີ</td></tr>'}
        </tbody></table></div>`;
    view().querySelectorAll("[data-goto]").forEach(c => c.onclick = () => location.hash = "#/" + c.dataset.goto);
  }
  const reportCard = (route, title, desc) => `<div class="card p-5 cursor-pointer hover:border-brand-300" data-goto="${route}"><div class="font-semibold">${title}</div><div class="hint mt-1">${desc}</div></div>`;

  /* ================= SETTINGS ================= */
  function settings() {
    const c = Store.get("settings", "company") || {};
    const taxes = Store.all("taxcodes");
    view().innerHTML = UI.pageHead("ຕັ້ງຄ່າ & Governance", "ໂປຣໄຟລ໌ບໍລິສັດ · ພາສີ · ຄວາມປອດໄພ", "") +
      `<div class="grid lg:grid-cols-2 gap-4">
        <div class="card p-5"><h3 class="font-semibold mb-3">ໂປຣໄຟລ໌ບໍລິສັດ</h3>
          <div class="space-y-3">
            <div><label class="field">ຊື່ບໍລິສັດ</label><input class="input" id="s-name" value="${E(c.name || "")}"></div>
            <div><label class="field">TIN</label><input class="input" id="s-tin" value="${E(c.tin || "")}"></div>
            <div><label class="field">ວັນລັອກບັນຊີ (ຫ້າມ Post ກ່ອນວັນນີ້)</label><input class="input" id="s-lock" type="date" value="${E(c.lock_date || "")}"></div>
            <button class="btn btn-primary" id="s-save">ບັນທຶກ</button>
          </div>
        </div>
        <div class="card p-5"><h3 class="font-semibold mb-3">ລະຫັດ VAT</h3>
          <table class="data"><thead><tr><th>ຊື່</th><th class="num">ອັດຕາ%</th><th>ປະເພດ</th></tr></thead><tbody>
          ${taxes.map(t => `<tr><td>${E(t.name)}</td><td class="num">${t.rate}</td><td>${E(t.type)}</td></tr>`).join("")}</tbody></table>
          <h3 class="font-semibold mt-5 mb-2">ການເຊື່ອມຕໍ່ຂໍ້ມູນ</h3>
          <div class="text-sm mb-3">${Store.mode === "cloud" ? '<span class="badge green">☁ Cloud · Google Sheet</span>' : '<span class="badge amber">💾 Demo Mode · ເກັບໃນ browser</span>'}</div>
          ${Store.mode === "demo" ? '<p class="hint mb-3">ເປີດ config.js ໃສ່ URL Apps Script ເພື່ອເກັບໃນ Google Sheet (ເບິ່ງ README.md)</p><button class="btn btn-danger" id="s-reset">ລ້າງຂໍ້ມູນ Demo</button>' : ""}
        </div>
      </div>`;
    view().querySelector("#s-save").onclick = () => { Store.update("settings", "company", { name: view().querySelector("#s-name").value, tin: view().querySelector("#s-tin").value, lock_date: view().querySelector("#s-lock").value }); UI.toast("ບັນທຶກແລ້ວ", "ok"); boot(); };
    const rs = view().querySelector("#s-reset"); if (rs) rs.onclick = () => UI.confirmDialog("ລ້າງຂໍ້ມູນ Demo ທັງໝົດ?", () => { Store.resetDemo(); location.reload(); });
  }

  /* ---------------- Global search ---------------- */
  function setupSearch() {
    const inp = document.getElementById("globalSearch"), box = document.getElementById("searchResults");
    inp.oninput = () => {
      const q = inp.value.trim().toLowerCase();
      if (!q) { box.classList.add("hidden"); return; }
      const hits = [];
      Store.all("customers").forEach(c => c.name.toLowerCase().includes(q) && hits.push(["👥 ລູກຄ້າ", c.name, "#/customers"]));
      Store.all("vendors").forEach(v => v.name.toLowerCase().includes(q) && hits.push(["🏭 ຜູ້ສະໜອງ", v.name, "#/vendors"]));
      Store.all("items").forEach(i => (i.name.toLowerCase().includes(q) || (i.sku || "").toLowerCase().includes(q)) && hits.push(["📦 ສິນຄ້າ", i.name, "#/inventory"]));
      Store.all("invoices").forEach(i => (i.number || "").toLowerCase().includes(q) && hits.push(["🧾 Invoice", i.number, "#/invoices"]));
      Store.all("bills").forEach(b => (b.number || "").toLowerCase().includes(q) && hits.push(["📥 Bill", b.number, "#/bills"]));
      box.innerHTML = hits.length ? hits.slice(0, 12).map(([t, n, h]) => `<a href="${h}" class="block px-3 py-2 hover:bg-slate-50 text-sm border-b border-slate-100"><span class="text-slate-400">${t}</span> · ${E(n)}</a>`).join("") : '<div class="px-3 py-3 text-sm text-slate-400">ບໍ່ພົບ</div>';
      box.classList.remove("hidden");
    };
    document.addEventListener("click", e => { if (!box.contains(e.target) && e.target !== inp) box.classList.add("hidden"); });
  }

  /* ---------------- Router ---------------- */
  const ROUTES = { dashboard, customers, invoices, vendors, bills, inventory, banking, gl, assets, payroll, budget, reports, settings };
  function router() {
    const route = (location.hash.replace("#/", "") || "dashboard").split("?")[0];
    setActive(route);
    document.getElementById("sidebar").classList.add("-translate-x-full");
    (ROUTES[route] || dashboard)();
    window.scrollTo(0, 0);
  }

  /* ---------------- Boot ---------------- */
  async function boot() {
    const c = Store.get("settings", "company");
    if (c) { document.getElementById("companyName").textContent = c.name; }
    const badge = document.getElementById("conn-badge");
    badge.innerHTML = Store.mode === "cloud" ? '<span class="text-green-400">● Google Sheet</span>' : '<span class="text-amber-400">● Demo Mode</span>';
  }

  async function init() {
    buildNav(); setupSearch();
    document.getElementById("menuBtn").onclick = () => document.getElementById("sidebar").classList.toggle("-translate-x-full");
    view().innerHTML = '<div class="text-center text-slate-400 py-20">ກຳລັງໂຫລດ...</div>';
    try { await Store.boot(); } catch (e) { view().innerHTML = '<div class="card p-6 text-red-600">ເຊື່ອມຕໍ່ບໍ່ສຳເລັດ: ' + E(e.message) + '<br><span class="hint">ກວດ URL ໃນ config.js ຫຼື ປະໄວ້ວ່າງເພື່ອໃຊ້ Demo Mode</span></div>'; return; }
    await boot();
    window.addEventListener("hashchange", router);
    router();
  }
  window.addEventListener("DOMContentLoaded", init);
})();


  </script>
</body>
</html>
